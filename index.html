<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1E1C19">
  <title>piggo</title>
  <link rel="icon" href="piggo-icon.png">
  <link rel="apple-touch-icon" href="piggo-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #1E1C19;
      --surf:   #272420;
      --raised: #302D28;
      --pig:    #FF85A8;
      --go:     #FFB84D;
      --done:   #3DD68C;
      --danger: #FF453A;
      --text:   #F2EDE5;
      --muted:  #8A8480;
      --border: #3C3830;
    }

    html { height: 100%; background: var(--bg); }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    /* ── Header ──────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(30,28,25,0.94);
      backdrop-filter: saturate(180%) blur(14px);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      border-bottom: 1px solid var(--border);
      height: 60px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
      user-select: none;
      flex-shrink: 0;
    }
    .logo .pig { color: #fff; }
    .logo .go  { color: var(--pig); }

    /* ── Bottom tab bar ──────────────────────────── */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: rgba(30,28,25,0.96);
      backdrop-filter: saturate(180%) blur(14px);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .vtab {
      flex: 1;
      height: 80px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.03em;
    }
    .vtab.active { color: var(--pig); }
    .tab-spacer  { height: calc(80px + env(safe-area-inset-bottom, 0px)); }

    /* ── Day Navigation ──────────────────────────── */
    .day-nav {
      display: flex;
      align-items: center;
      padding: 10px 16px 6px;
      gap: 6px;
    }
    .nav-arr {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surf);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.12s, opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-arr:active { background: var(--raised); }
    .day-mid {
      flex: 1;
      text-align: center;
      line-height: 1.2;
    }
    .day-big   { font-size: 15px; font-weight: 800; letter-spacing: 0.03em; cursor: pointer; }
    .day-small { font-size: 11px; color: var(--muted); letter-spacing: 0.04em; margin-top: 1px; }

    /* ── New habit button ────────────────────────── */
    .new-habit-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 13px 7px 10px;
      background: rgba(255,92,124,0.12);
      border: none;
      border-radius: 20px;
      color: var(--pig);
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .new-habit-btn:active { background: rgba(255,92,124,0.22); }

    /* ── List ────────────────────────────────────── */
    .list {
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Empty ───────────────────────────────────── */
    .empty {
      padding: 52px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
    }
    .empty-icon  { font-size: 56px; line-height: 1; }
    .empty-title { font-size: 18px; font-weight: 700; }
    .empty-sub   { font-size: 14px; color: var(--muted); line-height: 1.55; max-width: 220px; }

    /* ── Habit card ──────────────────────────────── */
    .card {
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: slideUp 0.28s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }
    .card.checked {
      border-color: rgba(61,214,140,0.28);
      background: #1d2922;
    }
    .card-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .check-btn {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, border-color 0.18s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .check-btn:active { transform: scale(0.86); }
    .card.checked .check-btn { background: var(--habit-color, var(--done)); border-color: var(--habit-color, var(--done)); }
    .check-btn svg { width: 18px; height: 18px; color: #fff; opacity: 0; transition: opacity 0.15s; }
    .card.checked .check-btn svg { opacity: 1; }

    .info { flex: 1; min-width: 0; }
    .hname {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .hem { font-size: 18px; }
    .hstreak { margin-top: 3px; font-size: 12px; font-weight: 600; color: var(--go); }
    .hstreak.cold { color: var(--muted); font-weight: 400; }

.delete-habit-btn {
      width: 100%;
      padding: 13px;
      margin-top: 6px;
      background: transparent;
      border: none;
      color: var(--danger);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      opacity: 0.75;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .delete-habit-btn:active { opacity: 1; }

    /* 7-day dots */
    .dots { display: flex; gap: 4px; padding-left: 2px; }
    .dot-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--border);
    }
    .dot.past-done { background: var(--pig); }
    .dot.ref-done  { background: var(--done); }
    .dot.ref-open  { background: transparent; border: 1.5px solid var(--go); }
    .dot-lbl { font-size: 9px; font-weight: 500; color: var(--muted); }
    .dot-lbl.ref { color: var(--go); }

    /* ── Calendar ────────────────────────────────── */
    .cal-wrap { padding: 0 0 20px; }
    .cal-dow-row, .cal-grid { padding: 0 16px; }

    .cal-nav {
      display: flex;
      align-items: center;
      padding: 10px 16px 6px;
      gap: 6px;
    }
    .cal-nav-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surf);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.12s, opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-nav-btn:active { background: var(--raised); }
    .cal-month-title { flex: 1; text-align: center; font-size: 15px; font-weight: 800; letter-spacing: 0.03em; cursor: pointer; }

    .cal-dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 3px;
    }
    .cal-dow {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      padding-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

    .cal-cell {
      border: 1.5px solid transparent;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5px 1px 4px;
      gap: 3px;
      min-height: 96px;
      cursor: pointer;
      background: transparent;
      font-family: inherit;
      transition: background 0.1s, border-color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-cell.empty { opacity: 0; pointer-events: none; cursor: default; }
    .cal-cell:not(.empty):active { background: var(--surf); }
    .cal-cell.is-today    { border-color: var(--go); }
    .cal-cell.is-selected { background: rgba(255,92,124,0.14); border-color: var(--pig); }
    .cal-cell.all-done    { background: rgba(61,214,140,0.08); }

    .cal-num {
      font-size: 13px;
      font-weight: 600;
      line-height: 1;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .cal-cell.is-today    .cal-num { color: var(--go); }
    .cal-cell.is-selected .cal-num { color: var(--pig); }

    .cal-emojis {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .cal-ec + .cal-ec { margin-top: -12px; }
    .cal-ec {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--raised);
      border: 1px solid var(--bg);
      display: grid;
      place-items: center;
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
      isolation: isolate;
    }
    .cal-ec.cal-more {
      font-size: 7px;
      font-weight: 700;
      color: var(--muted);
      background: var(--border);
      font-family: inherit;
    }


    /* ── Sheet ───────────────────────────────────── */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .backdrop.open { opacity: 1; pointer-events: all; }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 101;
      background: var(--raised);
      border-radius: 24px 24px 0 0;
      padding: 0 20px calc(28px + env(safe-area-inset-bottom, 0px));
      transform: translateY(105%);
      transition: transform 0.34s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .sheet.open { transform: translateY(0); }

    .handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 20px;
    }
    .sheet-title {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 16px;
    }
    .field { margin-bottom: 14px; }
    .field-lbl {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .text-input {
      width: 100%;
      background: var(--surf);
      border: 1.5px solid var(--border);
      border-radius: 13px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      padding: 13px 14px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }
    .text-input::placeholder { color: var(--muted); }
    .text-input:focus { border-color: var(--pig); }

    .emoji-scroll {
      max-height: 130px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-radius: 10px;
    }
    .emoji-scroll::-webkit-scrollbar { display: none; }
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 5px;
    }
    .emoji-btn {
      aspect-ratio: 1;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surf);
      border: 2px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      padding: 0;
      transition: border-color 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .emoji-btn:active { transform: scale(0.82); }
    .emoji-btn.on { border-color: var(--pig); }

    .color-row { display: flex; gap: 9px; flex-wrap: wrap; }
    .color-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.12s, outline 0.1s;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    .color-btn:active { transform: scale(0.82); }
    .color-btn.on { outline: 2.5px solid var(--text); outline-offset: 2px; transform: scale(1.08); }

    .submit-btn {
      width: 100%;
      padding: 15px;
      margin-top: 16px;
      background: linear-gradient(135deg, var(--pig), var(--go));
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .submit-btn:disabled { opacity: 0.3; cursor: default; }
    .submit-btn:not(:disabled):active { opacity: 0.82; }

    /* ── Confirm overlay ─────────────────────────── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .confirm-overlay.open { opacity: 1; pointer-events: all; }
    .confirm-card {
      background: var(--raised);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px 20px 16px;
      width: 100%;
      max-width: 310px;
      transform: scale(0.9);
      transition: transform 0.2s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .confirm-overlay.open .confirm-card { transform: scale(1); }
    .confirm-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
    .confirm-sub {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .confirm-btns { display: flex; flex-direction: column; gap: 8px; }
    .confirm-del {
      padding: 13px;
      background: var(--danger);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .confirm-del:active { opacity: 0.85; }
    .confirm-cancel {
      padding: 13px;
      background: var(--surf);
      border: none;
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .confirm-cancel:active { opacity: 0.7; }

    /* ── Animations ──────────────────────────────── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.22); }
      100% { transform: scale(1); }
    }
    @keyframes slideInFromRight {
      from { opacity: 0; transform: translateX(36px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInFromLeft {
      from { opacity: 0; transform: translateX(-36px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .popping { animation: pop 0.22s cubic-bezier(0.34, 1.6, 0.64, 1); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────── -->
<header>
  <div class="logo" aria-label="piggo"><span class="pig">pig</span><span class="go">go</span></div>
  <button class="new-habit-btn" id="jNewHabit">
    <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
      <line x1="5.5" y1="1" x2="5.5" y2="10"/><line x1="1" y1="5.5" x2="10" y2="5.5"/>
    </svg>
    New habit
  </button>
</header>

<!-- ── LIST VIEW ───────────────────────────────── -->
<div id="vList">
  <div class="day-nav">
    <button class="nav-arr" id="jPrev" aria-label="Previous day">
      <svg width="9" height="15" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="7.5,1.5 1.5,7.5 7.5,13.5"/>
      </svg>
    </button>
    <div class="day-mid">
      <div class="day-big" id="jDayBig"></div>
      <div class="day-small" id="jDaySub"></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <button class="nav-arr" id="jNext" aria-label="Next day">
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1.5,1.5 7.5,7.5 1.5,13.5"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="list" id="jList"></div>
</div>

<!-- ── CALENDAR VIEW ────────────────────────────── -->
<div id="vCal" style="display:none">
  <div class="cal-wrap">
    <div class="cal-nav">
      <button class="cal-nav-btn" data-cal="prev">
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="7.5,1.5 1.5,7.5 7.5,13.5"/>
        </svg>
      </button>
      <span class="cal-month-title" id="jCalTitle"></span>
      <button class="cal-nav-btn" data-cal="next">
        <svg width="9" height="15" viewBox="0 0 9 15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1.5,1.5 7.5,7.5 1.5,13.5"/>
        </svg>
      </button>
    </div>
    <div class="cal-dow-row" id="jDow"></div>
    <div class="cal-grid" id="jCalGrid"></div>
  </div>
</div>

<div class="tab-spacer"></div>

<nav class="tab-bar" role="tablist">
  <button class="vtab active" data-view="list" role="tab" aria-selected="true">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <circle cx="9" cy="9" r="3.5"/>
      <line x1="9" y1="1" x2="9" y2="2.5"/>
      <line x1="9" y1="15.5" x2="9" y2="17"/>
      <line x1="1" y1="9" x2="2.5" y2="9"/>
      <line x1="15.5" y1="9" x2="17" y2="9"/>
      <line x1="3.2" y1="3.2" x2="4.3" y2="4.3"/>
      <line x1="13.7" y1="13.7" x2="14.8" y2="14.8"/>
      <line x1="14.8" y1="3.2" x2="13.7" y2="4.3"/>
      <line x1="4.3" y1="13.7" x2="3.2" y2="14.8"/>
    </svg>
    Day
  </button>
  <button class="vtab" data-view="calendar" role="tab" aria-selected="false">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1" y="3" width="14" height="12" rx="2"/><line x1="1" y1="7" x2="15" y2="7"/><line x1="5" y1="1" x2="5" y2="5"/><line x1="11" y1="1" x2="11" y2="5"/>
    </svg>
    Calendar
  </button>
</nav>

<div class="backdrop" id="jBackdrop"></div>
<div class="sheet" id="jSheet" role="dialog" aria-modal="true" aria-label="Add a habit">
  <div class="handle"></div>
  <div class="sheet-title" id="jSheetTitle">New habit</div>
  <div class="field">
    <label class="field-lbl" for="jName">Name</label>
    <input class="text-input" id="jName" type="text" placeholder="e.g. Morning run" maxlength="40" autocomplete="off" spellcheck="false">
  </div>
  <div class="field">
    <span class="field-lbl">Emoji</span>
    <div class="emoji-scroll">
      <div class="emoji-grid" id="jEmojis"></div>
    </div>
  </div>
  <div class="field">
    <span class="field-lbl">Color</span>
    <div class="color-row" id="jColors"></div>
  </div>
  <button class="submit-btn" id="jSubmit" disabled>Add habit</button>
  <button class="delete-habit-btn" id="jDeleteHabit" style="display:none">Delete habit</button>
</div>

<div class="confirm-overlay" id="jConfirmOverlay">
  <div class="confirm-card">
    <div class="confirm-title">Delete habit?</div>
    <div class="confirm-sub" id="jConfirmSub">This will remove all your progress for this habit.</div>
    <div class="confirm-btns">
      <button class="confirm-del" id="jConfirmDel">Delete</button>
      <button class="confirm-cancel" id="jConfirmCancel">Cancel</button>
    </div>
  </div>
</div>

<script>
  /* ── Constants ─────────────────────────────────── */
  const EMOJIS = [
    // Fitness
    '🏃','💪','🧘','🚴','🏊','🤸','🏋️','🥊','⛹️','🧗','🏄','🛹','🏇','⛷️','🤾',
    // Mind & learning
    '📚','🧠','✍️','🎯','📖','📝','💡','🎓','🔬','📊','📐','🗒️','🔭','💭','📌',
    // Food & body
    '💧','🥗','🍎','🥤','🦷','😴','🧼','💊','🥦','🫐','🍵','🥑','🧃','🍇','🫚',
    // Creative
    '🎨','🎵','🎸','🎹','📷','✏️','🎭','🖌️','🎬','🎤','🪗','🎻','🪘','🖊️','📸',
    // Nature
    '🌿','☀️','🌱','🌸','🌙','🍀','🌊','🌻','🌈','⛰️','🌺','🌾','🦋','🐾','🌅',
    // Life
    '❤️','🐷','⚡','🧹','💰','🙏','🌟','✅','💻','🎁','🕯️','🏠','🔑','🛁','🚿',
  ];

  const DAYS_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const DAYS_SHORT = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const DAYS_3     = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MONTHS_SH   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MONTHS_3    = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

  const COLORS = [
    '#FF85A8','#FF6B6B','#FFB84D','#FACC15',
    '#3DD68C','#2DD4BF','#5B9CF6','#A78BFA',
  ];

  /* ── State ─────────────────────────────────────── */
  let habits = [];
  let selectedDate = todayKey();
  let viewMode = 'list';   // 'list' | 'cal'
  let calYear, calMonth;
  let pickedEmoji = EMOJIS[0];
  let pickedColor = COLORS[0];
  let editingId = null;

  /* ── Date helpers ───────────────────────────────── */
  function dkey(d) {
    const y  = d.getFullYear();
    const m  = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${dd}`;
  }

  function todayKey() { return dkey(new Date()); }

  function parseDate(str) {
    // Parse YYYY-MM-DD as local (not UTC)
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function shortDate(str) {
    const d = parseDate(str);
    return `${DAYS_3[d.getDay()]}, ${d.getDate()} ${MONTHS_3[d.getMonth()]}`;
  }

  function dayLabel(str) {
    const tk = todayKey();
    const sd = shortDate(str);
    if (str === tk) return [`TODAY · ${sd}`, ''];
    const yest = new Date(); yest.setDate(yest.getDate() - 1);
    if (str === dkey(yest)) return [`YESTERDAY · ${sd}`, ''];
    const tom = new Date(); tom.setDate(tom.getDate() + 1);
    if (str === dkey(tom)) return [`TOMORROW · ${sd}`, ''];
    return [sd, ''];
  }

  /* ── Persistence ────────────────────────────────── */
  function load() {
    try { habits = JSON.parse(localStorage.getItem('piggo_habits')) || []; }
    catch { habits = []; }
    viewMode = localStorage.getItem('piggo_view') || 'list';
  }

  function save() {
    localStorage.setItem('piggo_habits', JSON.stringify(habits));
  }

  /* ── Streak (always relative to today) ─────────── */
  function streak(habit) {
    const set = new Set(habit.completions);
    const d = new Date();
    if (!set.has(dkey(d))) d.setDate(d.getDate() - 1);
    let n = 0;
    while (set.has(dkey(d))) { n++; d.setDate(d.getDate() - 1); }
    return n;
  }

  /* ── 7-day window (relative to selectedDate) ────── */
  function last7(habit) {
    const set = new Set(habit.completions);
    const ref = parseDate(selectedDate);
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(ref);
      d.setDate(ref.getDate() - (6 - i));
      const k = dkey(d);
      return { k, isRef: i === 6, done: set.has(k), label: DAYS_SHORT[d.getDay()] };
    });
  }

  /* ── Mutations ──────────────────────────────────── */
  function toggle(id) {
    const h = habits.find(h => h.id === id);
    if (!h) return;
    const idx = h.completions.indexOf(selectedDate);
    idx === -1 ? h.completions.push(selectedDate) : h.completions.splice(idx, 1);
    save();
    const checked = h.completions.includes(selectedDate);
    const card = document.querySelector(`.card[data-id="${id}"]`);
    if (card) {
      card.classList.toggle('checked', checked);
      const btn = card.querySelector('.check-btn');
      if (btn) btn.setAttribute('aria-pressed', checked);
      const refDot = card.querySelector('.dot.ref-done, .dot.ref-open');
      if (refDot) refDot.className = `dot ${checked ? 'ref-done' : 'ref-open'}`;
    }
  }

  function remove(id) {
    habits = habits.filter(h => h.id !== id);
    save();
    render();
  }

  function addHabit(name, emoji, color) {
    habits.unshift({
      id: Math.random().toString(36).slice(2, 10),
      name: name.trim(),
      emoji,
      color,
      createdAt: selectedDate,
      completions: [],
    });
    save();
    render();
  }

  function updateHabit(id, name, emoji, color) {
    const h = habits.find(h => h.id === id);
    if (!h) return;
    h.name = name.trim();
    h.emoji = emoji;
    h.color = color;
    save();
    render();
  }

  /* ── Render: list view ──────────────────────────── */
  function renderList() {
    // Day nav
    const [big, sub] = dayLabel(selectedDate);
    document.getElementById('jDayBig').textContent = big;
    document.getElementById('jDaySub').textContent = sub;

    const list = document.getElementById('jList');
    const total = habits.length;

    if (!total) {
      list.innerHTML = `<div class="empty">
        <div class="empty-icon">🐷</div>
        <div class="empty-title">No habits yet</div>
        <div class="empty-sub">Tap "New habit" above to add your first habit and start building streaks.</div>
      </div>`;
      return;
    }

    list.innerHTML = habits.map(h => {
      const checked = h.completions.includes(selectedDate);
      const s = streak(h);
      const streakHTML = s > 0
        ? `<div class="hstreak">🔥 ${s} day${s !== 1 ? 's' : ''}</div>`
        : `<div class="hstreak cold">start your streak</div>`;

      const dots = last7(h).map(({ done, isRef, label }) => {
        let cls = 'dot';
        if (isRef)        cls += done ? ' ref-done' : ' ref-open';
        else if (done)    cls += ' past-done';
        return `<div class="dot-col">
          <div class="${cls}"></div>
          <div class="dot-lbl${isRef ? ' ref' : ''}">${label}</div>
        </div>`;
      }).join('');

      const accentColor = h.color || COLORS[0];
      return `<div class="card${checked ? ' checked' : ''}" data-id="${h.id}" style="border-color: ${accentColor}; --habit-color: ${accentColor}">
        <div class="card-top">
          <button class="check-btn" data-action="check" aria-label="Toggle ${h.name}" aria-pressed="${checked}">
            <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3,9.5 7.5,14 15,4.5"/>
            </svg>
          </button>
          <div class="info">
            <div class="hname"><span class="hem">${h.emoji}</span>${h.name}</div>
            ${streakHTML}
          </div>
        </div>
        <div class="dots">${dots}</div>
      </div>`;
    }).join('');
  }

  /* ── Render: calendar view ──────────────────────── */
  function renderCalendar() {
    document.getElementById('jCalTitle').textContent =
      `${MONTHS_FULL[calMonth]} ${calYear}`;

    // Day-of-week headers
    document.getElementById('jDow').innerHTML =
      DAYS_SHORT.map(d => `<div class="cal-dow">${d}</div>`).join('');

    const todayStr    = todayKey();
    const firstDay    = new Date(calYear, calMonth, 1);
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const startDow    = firstDay.getDay();

    let cells = '';

    // Leading empty cells
    for (let i = 0; i < startDow; i++) {
      cells += '<div class="cal-cell empty"></div>';
    }

    // Month days
    for (let day = 1; day <= daysInMonth; day++) {
      const d   = new Date(calYear, calMonth, day);
      const k   = dkey(d);
      const isToday    = k === todayStr;
      const isSelected = k === selectedDate;
      const doneHabits = habits.filter(h => h.completions.includes(k));
      const allDone    = habits.length > 0 && doneHabits.length === habits.length;

      let cls = 'cal-cell';
      if (isToday)    cls += ' is-today';
      if (isSelected) cls += ' is-selected';
      if (allDone)    cls += ' all-done';

      let emojisHTML = '';
      if (doneHabits.length > 0) {
        const COL_MAX = 3;
        const showCount = doneHabits.length > COL_MAX ? COL_MAX - 1 : doneHabits.length;
        const extra = doneHabits.length - showCount;
        let items = doneHabits.slice(0, showCount)
          .map(h => `<div class="cal-ec" style="background:${h.color || COLORS[0]}"><span style="display:block;transform:translateY(1px)">${h.emoji}</span></div>`).join('');
        if (extra > 0) items += `<div class="cal-ec cal-more">+${extra}</div>`;
        emojisHTML = `<div class="cal-emojis">${items}</div>`;
      }

      cells += `<button class="${cls}" data-k="${k}">
        <span class="cal-num">${day}</span>
        ${emojisHTML}
      </button>`;
    }

    // Trailing empties to fill last row
    const lastDow  = (startDow + daysInMonth - 1) % 7;
    const trailing = lastDow === 6 ? 0 : 6 - lastDow;
    for (let i = 0; i < trailing; i++) {
      cells += '<div class="cal-cell empty"></div>';
    }

    document.getElementById('jCalGrid').innerHTML = cells;
  }

  /* ── Master render ──────────────────────────────── */
  function render() {
    if (viewMode === 'list') renderList();
    else                     renderCalendar();
  }

  /* ── View switching ─────────────────────────────── */
  function setView(v) {
    viewMode = v;
    localStorage.setItem('piggo_view', v);
    document.getElementById('vList').style.display    = v === 'list' ? '' : 'none';
    document.getElementById('vCal').style.display     = v === 'cal'  ? '' : 'none';
    document.getElementById('jNewHabit').style.display = v === 'list' ? '' : 'none';
    document.querySelectorAll('.vtab').forEach(btn => {
      const on = btn.dataset.view === (v === 'cal' ? 'calendar' : v);
      btn.classList.toggle('active', on);
      btn.setAttribute('aria-selected', on);
    });
    if (v === 'cal') {
      const d = parseDate(selectedDate);
      calYear  = d.getFullYear();
      calMonth = d.getMonth();
    }
    render();
  }

  /* ── Events ─────────────────────────────────────── */

  // View tabs
  document.querySelector('.tab-bar').addEventListener('click', e => {
    const tab = e.target.closest('.vtab');
    if (!tab) return;
    setView(tab.dataset.view === 'calendar' ? 'cal' : 'list');
  });

  // Tap date label → jump to today
  document.getElementById('jDayBig').addEventListener('click', () => {
    selectedDate = todayKey();
    renderList();
  });

  // Tap month title → jump to current month
  document.getElementById('jCalTitle').addEventListener('click', () => {
    const now = new Date();
    calYear  = now.getFullYear();
    calMonth = now.getMonth();
    renderCalendar();
  });

  // Day nav arrows
  document.getElementById('jPrev').addEventListener('click', () => {
    const d = parseDate(selectedDate);
    d.setDate(d.getDate() - 1);
    selectedDate = dkey(d);
    renderList();
  });
  document.getElementById('jNext').addEventListener('click', () => {
    const d = parseDate(selectedDate);
    d.setDate(d.getDate() + 1);
    selectedDate = dkey(d);
    renderList();
  });

  // Habit card actions (check / delete)
  document.getElementById('jList').addEventListener('click', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    const id = card.dataset.id;

    if (e.target.closest('[data-action="check"]')) {
      toggle(id);
      const btn = document.querySelector(`.card[data-id="${id}"] .check-btn`);
      if (btn) { btn.classList.remove('popping'); void btn.offsetWidth; btn.classList.add('popping'); }
    } else {
      openSheet(id);
    }
  });

  // Calendar: month nav
  document.querySelector('.cal-wrap').addEventListener('click', e => {
    const btn = e.target.closest('[data-cal]');
    if (btn) {
      if (btn.dataset.cal === 'prev') {
        calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
      } else {
        calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
      }
      renderCalendar();
      return;
    }
    // Day cell click → jump to that day in list view
    const cell = e.target.closest('.cal-cell[data-k]');
    if (cell) {
      selectedDate = cell.dataset.k;
      setView('list');
    }
  });

  function openSheet(id = null) {
    editingId = id;
    const delBtn = document.getElementById('jDeleteHabit');
    if (id) {
      const h = habits.find(h => h.id === id);
      document.getElementById('jSheetTitle').textContent = 'Edit habit';
      document.getElementById('jSubmit').textContent     = 'Save changes';
      document.getElementById('jName').value             = h.name;
      document.getElementById('jSubmit').disabled        = false;
      delBtn.style.display = '';
      pickedEmoji = h.emoji;
      pickedColor = h.color || COLORS[0];
    } else {
      document.getElementById('jSheetTitle').textContent = 'New habit';
      document.getElementById('jSubmit').textContent     = 'Add habit';
      document.getElementById('jName').value             = '';
      document.getElementById('jSubmit').disabled        = true;
      delBtn.style.display = 'none';
      pickedEmoji = EMOJIS[0];
      pickedColor = COLORS[0];
    }
    renderEmojis();
    renderColors();
    document.getElementById('jBackdrop').classList.add('open');
    document.getElementById('jSheet').classList.add('open');
    setTimeout(() => document.getElementById('jName').focus(), 360);
  }

  let confirmPendingId = null;

  function showConfirm(id) {
    const h = habits.find(h => h.id === id);
    if (!h) return;
    confirmPendingId = id;
    document.getElementById('jConfirmSub').textContent = `"${h.name}" and all its progress will be permanently deleted.`;
    document.getElementById('jConfirmOverlay').classList.add('open');
  }

  function hideConfirm() {
    confirmPendingId = null;
    document.getElementById('jConfirmOverlay').classList.remove('open');
  }

  document.getElementById('jDeleteHabit').addEventListener('click', () => {
    if (!editingId) return;
    showConfirm(editingId);
  });

  document.getElementById('jConfirmDel').addEventListener('click', () => {
    if (!confirmPendingId) return;
    remove(confirmPendingId);
    hideConfirm();
    closeSheet();
  });

  document.getElementById('jConfirmCancel').addEventListener('click', hideConfirm);

  function closeSheet() {
    editingId = null;
    document.getElementById('jBackdrop').classList.remove('open');
    document.getElementById('jSheet').classList.remove('open');
    document.getElementById('jName').value = '';
    document.getElementById('jSubmit').disabled = true;
    pickedEmoji = EMOJIS[0];
    pickedColor = COLORS[0];
    renderEmojis();
    renderColors();
  }

  // New habit button
  document.getElementById('jNewHabit').addEventListener('click', () => openSheet());

  // Backdrop closes sheet
  document.getElementById('jBackdrop').addEventListener('click', closeSheet);

  // Sheet input
  document.getElementById('jName').addEventListener('input', e => {
    document.getElementById('jSubmit').disabled = !e.target.value.trim();
  });
  document.getElementById('jName').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const name = e.target.value.trim();
      if (!name) return;
      editingId ? updateHabit(editingId, name, pickedEmoji, pickedColor) : addHabit(name, pickedEmoji, pickedColor);
      closeSheet();
    }
  });
  document.getElementById('jSubmit').addEventListener('click', () => {
    const name = document.getElementById('jName').value.trim();
    if (!name) return;
    editingId ? updateHabit(editingId, name, pickedEmoji, pickedColor) : addHabit(name, pickedEmoji, pickedColor);
    closeSheet();
  });

  // Emoji grid
  function renderEmojis() {
    document.getElementById('jEmojis').innerHTML = EMOJIS.map(e =>
      `<button class="emoji-btn${e === pickedEmoji ? ' on' : ''}" data-emoji="${e}" aria-label="${e}">${e}</button>`
    ).join('');
  }
  document.getElementById('jEmojis').addEventListener('click', e => {
    const btn = e.target.closest('.emoji-btn');
    if (!btn) return;
    pickedEmoji = btn.dataset.emoji;
    renderEmojis();
  });

  function renderColors() {
    document.getElementById('jColors').innerHTML = COLORS.map(c =>
      `<button class="color-btn${c === pickedColor ? ' on' : ''}" data-color="${c}" style="background:${c}" aria-label="${c}"></button>`
    ).join('');
  }
  document.getElementById('jColors').addEventListener('click', e => {
    const btn = e.target.closest('.color-btn');
    if (!btn) return;
    pickedColor = btn.dataset.color;
    renderColors();
  });

  /* ── Swipe gestures ─────────────────────────────── */
  function addSwipe(el, onLeft, onRight) {
    let sx = 0, sy = 0;
    el.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX;
      sy = e.touches[0].clientY;
    }, { passive: true });
    el.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      if (Math.abs(dx) < 40 || Math.abs(dx) < Math.abs(dy)) return;
      dx < 0 ? onLeft() : onRight();
    }, { passive: true });
  }

  function slideAnimate(el, fromRight) {
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = fromRight
      ? 'slideInFromRight 0.28s cubic-bezier(0.25,1,0.5,1) both'
      : 'slideInFromLeft 0.28s cubic-bezier(0.25,1,0.5,1) both';
  }

  addSwipe(document.getElementById('vList'),
    () => { const d = parseDate(selectedDate); d.setDate(d.getDate() + 1); selectedDate = dkey(d); renderList(); slideAnimate(document.getElementById('jList'), true); },
    () => { const d = parseDate(selectedDate); d.setDate(d.getDate() - 1); selectedDate = dkey(d); renderList(); slideAnimate(document.getElementById('jList'), false); }
  );

  addSwipe(document.querySelector('.cal-wrap'),
    () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); slideAnimate(document.getElementById('jCalGrid'), true); },
    () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); slideAnimate(document.getElementById('jCalGrid'), false); }
  );

  /* ── Init ───────────────────────────────────────── */
  load();
  renderEmojis();
  renderColors();
  setView(viewMode);
</script>
</body>
</html>
