<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1E1C19">
  <title>piggo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #1E1C19;
      --surface:      #272420;
      --raised:       #302D28;
      --pig:          #FF5C7C;
      --go:           #FFB84D;
      --done:         #3DD68C;
      --danger:       #FF453A;
      --text:         #F2EDE5;
      --muted:        #8A8480;
      --border:       #3C3830;
      --safe-bottom:  env(safe-area-inset-bottom, 0px);
    }

    html {
      height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    /* ── Header ─────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(30, 28, 25, 0.92);
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.6px;
      line-height: 1;
      user-select: none;
    }

    .logo .pig { color: var(--pig); }
    .logo .go  { color: var(--go); }

    .header-date {
      text-align: right;
      line-height: 1.2;
    }

    .header-date .day {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .header-date .date {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* ── Progress ───────────────────────────── */
    .progress-wrap {
      padding: 18px 20px 0;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 9px;
    }

    .progress-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .progress-count {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .progress-count .total {
      font-weight: 400;
      color: var(--muted);
    }

    .track {
      height: 5px;
      background: var(--raised);
      border-radius: 3px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pig) 0%, var(--go) 100%);
      border-radius: 3px;
      transition: width 0.45s cubic-bezier(0.34, 1.3, 0.64, 1);
      transform-origin: left;
    }

    /* ── Habit list ─────────────────────────── */
    .list {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Empty state ────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 64px 32px;
      text-align: center;
    }

    .empty-icon {
      font-size: 60px;
      line-height: 1;
    }

    .empty-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .empty-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
      max-width: 240px;
    }

    /* ── Habit card ─────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
      animation: slideUp 0.28s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }

    .card.checked {
      border-color: rgba(61, 214, 140, 0.28);
      background: #1d2922;
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Check button */
    .check {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s, border-color 0.18s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .check:active { transform: scale(0.86); }

    .card.checked .check {
      background: var(--done);
      border-color: var(--done);
    }

    .check svg {
      width: 18px;
      height: 18px;
      color: #fff;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .card.checked .check svg { opacity: 1; }

    /* Habit info */
    .info { flex: 1; min-width: 0; }

    .habit-name {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.2;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .habit-name .em { font-size: 18px; }

    .streak {
      margin-top: 3px;
      font-size: 12px;
      font-weight: 600;
      color: var(--go);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .streak.cold { color: var(--muted); font-weight: 400; }

    /* Delete */
    .del {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s, opacity 0.15s;
      opacity: 0.45;
    }

    .del:active { color: var(--danger); opacity: 1; }

    /* 7-day dots */
    .dots {
      display: flex;
      gap: 4px;
      padding-left: 2px;
    }

    .dot-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.18s;
    }

    .dot.past-done  { background: var(--pig); }
    .dot.now-done   { background: var(--done); }
    .dot.now-open   { background: transparent; border: 1.5px solid var(--go); }

    .dot-day {
      font-size: 9px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .dot-day.now { color: var(--go); }

    /* ── FAB ────────────────────────────────── */
    .fab {
      position: fixed;
      right: 20px;
      bottom: calc(26px + var(--safe-bottom));
      z-index: 50;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(140deg, var(--pig) 0%, var(--go) 100%);
      color: #fff;
      font-size: 30px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(255, 92, 124, 0.45);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.14s, box-shadow 0.14s;
    }

    .fab:active {
      transform: scale(0.9);
      box-shadow: 0 3px 12px rgba(255, 92, 124, 0.3);
    }

    .fab-spacer { height: calc(96px + var(--safe-bottom)); }

    /* ── Bottom sheet ───────────────────────── */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .backdrop.open { opacity: 1; pointer-events: all; }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 101;
      background: var(--raised);
      border-radius: 24px 24px 0 0;
      padding: 0 20px calc(28px + var(--safe-bottom));
      transform: translateY(105%);
      transition: transform 0.34s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .sheet.open { transform: translateY(0); }

    .handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 22px;
    }

    .sheet-title {
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 20px;
      letter-spacing: -0.3px;
    }

    .field { margin-bottom: 16px; }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .text-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 13px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      padding: 13px 14px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }

    .text-input::placeholder { color: var(--muted); }
    .text-input:focus { border-color: var(--pig); }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
    }

    .emoji-btn {
      aspect-ratio: 1;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border: 2px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.1s, transform 0.1s;
      padding: 0;
    }

    .emoji-btn:active { transform: scale(0.82); }
    .emoji-btn.on { border-color: var(--pig); }

    .submit-btn {
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      background: linear-gradient(135deg, var(--pig) 0%, var(--go) 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: -0.2px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .submit-btn:disabled { opacity: 0.35; cursor: default; }
    .submit-btn:not(:disabled):active { opacity: 0.82; }

    /* ── Animations ─────────────────────────── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.22); }
      100% { transform: scale(1); }
    }

    .popping { animation: pop 0.22s cubic-bezier(0.34, 1.6, 0.64, 1); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" aria-label="piggo">
    <span class="pig">pig</span><span class="go">go</span>
  </div>
  <div class="header-date">
    <span class="day" id="jDay"></span>
    <span class="date" id="jDate"></span>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-row">
    <span class="progress-label">today</span>
    <span class="progress-count" id="jCount">0 <span class="total">/ 0</span></span>
  </div>
  <div class="track"><div class="fill" id="jFill" style="width:0%"></div></div>
</div>

<div class="list" id="jList"></div>
<div class="fab-spacer"></div>

<button class="fab" id="jFab" aria-label="Add habit">+</button>

<div class="backdrop" id="jBackdrop" role="presentation"></div>
<div class="sheet" id="jSheet" role="dialog" aria-modal="true" aria-label="Add a habit">
  <div class="handle"></div>
  <div class="sheet-title">New habit</div>

  <div class="field">
    <label class="field-label" for="jName">Name</label>
    <input class="text-input" id="jName" type="text" placeholder="e.g. Morning run" maxlength="40" autocomplete="off" spellcheck="false">
  </div>

  <div class="field">
    <span class="field-label">Emoji</span>
    <div class="emoji-grid" id="jEmojis"></div>
  </div>

  <button class="submit-btn" id="jSubmit" disabled>Add habit</button>
</div>

<script>
  const EMOJIS = [
    '🏃','💪','📚','🧘','💧','🥗','😴','✍️',
    '🎯','🧹','🎨','🎵','🚴','🌿','☀️','🦷',
    '🧠','❤️','🐷','⚡'
  ];

  const DAYS_FULL  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const DAYS_SHORT = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const MONTHS     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let habits = [];
  let pickedEmoji = EMOJIS[0];

  /* ── Persistence ─────────────────────────── */

  function load() {
    try { habits = JSON.parse(localStorage.getItem('piggo_habits')) || []; }
    catch { habits = []; }
  }

  function save() {
    localStorage.setItem('piggo_habits', JSON.stringify(habits));
  }

  /* ── Date helpers ────────────────────────── */

  function dkey(d) { return d.toISOString().slice(0, 10); }
  function todayKey() { return dkey(new Date()); }

  /* ── Streak ─────────────────────────────── */

  function streak(habit) {
    const set = new Set(habit.completions);
    const d = new Date();
    if (!set.has(dkey(d))) d.setDate(d.getDate() - 1);
    let n = 0;
    while (set.has(dkey(d))) { n++; d.setDate(d.getDate() - 1); }
    return n;
  }

  /* ── 7-day window ───────────────────────── */

  function last7(habit) {
    const set = new Set(habit.completions);
    const today = new Date();
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(today);
      d.setDate(today.getDate() - (6 - i));
      const k = dkey(d);
      return { k, isToday: i === 6, done: set.has(k), label: DAYS_SHORT[d.getDay()] };
    });
  }

  /* ── Mutations ──────────────────────────── */

  function toggleToday(id) {
    const h = habits.find(h => h.id === id);
    if (!h) return;
    const k = todayKey();
    const idx = h.completions.indexOf(k);
    idx === -1 ? h.completions.push(k) : h.completions.splice(idx, 1);
    save();
    render();
  }

  function removeHabit(id) {
    habits = habits.filter(h => h.id !== id);
    save();
    render();
  }

  function addHabit(name, emoji) {
    habits.unshift({
      id: Math.random().toString(36).slice(2, 10),
      name: name.trim(),
      emoji,
      createdAt: todayKey(),
      completions: [],
    });
    save();
    render();
  }

  /* ── Rendering ──────────────────────────── */

  function dotsHTML(habit) {
    return last7(habit).map(({ done, isToday, label }) => {
      let cls = 'dot';
      if (isToday)      cls += done ? ' now-done' : ' now-open';
      else if (done)    cls += ' past-done';
      return `<div class="dot-col">
        <div class="${cls}"></div>
        <div class="dot-day${isToday ? ' now' : ''}">${label}</div>
      </div>`;
    }).join('');
  }

  function render() {
    const tk = todayKey();
    const done = habits.filter(h => h.completions.includes(tk)).length;
    const total = habits.length;
    const pct = total ? Math.round((done / total) * 100) : 0;

    document.getElementById('jCount').innerHTML =
      `${done} <span class="total">/ ${total}</span>`;
    document.getElementById('jFill').style.width = pct + '%';

    const list = document.getElementById('jList');

    if (!total) {
      list.innerHTML = `<div class="empty">
        <div class="empty-icon">🐷</div>
        <div class="empty-title">No habits yet</div>
        <div class="empty-sub">Tap + to add your first habit and start building streaks.</div>
      </div>`;
      return;
    }

    list.innerHTML = habits.map(h => {
      const isChecked = h.completions.includes(tk);
      const s = streak(h);
      const streakHTML = s > 0
        ? `<div class="streak">🔥 ${s} day${s !== 1 ? 's' : ''}</div>`
        : `<div class="streak cold">start your streak</div>`;
      return `<div class="card${isChecked ? ' checked' : ''}" data-id="${h.id}">
        <div class="card-top">
          <button class="check" data-action="check" aria-label="Toggle ${h.name}" aria-pressed="${isChecked}">
            <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3,9.5 7.5,14 15,4.5"/>
            </svg>
          </button>
          <div class="info">
            <div class="habit-name">
              <span class="em">${h.emoji}</span>${h.name}
            </div>
            ${streakHTML}
          </div>
          <button class="del" data-action="delete" aria-label="Delete ${h.name}">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 4h12M5 4V2.5A.5.5 0 0 1 5.5 2h5a.5.5 0 0 1 .5.5V4M6 7v5M10 7v5M3 4l.8 9.2A1 1 0 0 0 4.8 14h6.4a1 1 0 0 0 1-.8L13 4"/>
            </svg>
          </button>
        </div>
        <div class="dots">${dotsHTML(h)}</div>
      </div>`;
    }).join('');
  }

  /* ── Event delegation ───────────────────── */

  document.getElementById('jList').addEventListener('click', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    const id = card.dataset.id;

    if (e.target.closest('[data-action="check"]')) {
      toggleToday(id);
      const btn = card.querySelector('[data-action="check"]');
      if (btn) {
        btn.classList.remove('popping');
        void btn.offsetWidth;
        btn.classList.add('popping');
      }
    }

    if (e.target.closest('[data-action="delete"]')) {
      const h = habits.find(h => h.id === id);
      if (h && confirm(`Delete "${h.name}"?`)) removeHabit(id);
    }
  });

  /* ── Sheet ──────────────────────────────── */

  let sheetOpen = false;

  function openSheet() {
    sheetOpen = true;
    document.getElementById('jBackdrop').classList.add('open');
    document.getElementById('jSheet').classList.add('open');
    setTimeout(() => document.getElementById('jName').focus(), 360);
  }

  function closeSheet() {
    sheetOpen = false;
    document.getElementById('jBackdrop').classList.remove('open');
    document.getElementById('jSheet').classList.remove('open');
    document.getElementById('jName').value = '';
    document.getElementById('jSubmit').disabled = true;
    pickedEmoji = EMOJIS[0];
    renderEmojis();
  }

  document.getElementById('jFab').addEventListener('click', openSheet);
  document.getElementById('jBackdrop').addEventListener('click', closeSheet);

  document.getElementById('jName').addEventListener('input', e => {
    document.getElementById('jSubmit').disabled = !e.target.value.trim();
  });

  document.getElementById('jName').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const name = e.target.value.trim();
      if (name) {
        addHabit(name, pickedEmoji);
        closeSheet();
      }
    }
  });

  document.getElementById('jSubmit').addEventListener('click', () => {
    const name = document.getElementById('jName').value.trim();
    if (!name) return;
    addHabit(name, pickedEmoji);
    closeSheet();
  });

  /* ── Emoji grid ─────────────────────────── */

  function renderEmojis() {
    document.getElementById('jEmojis').innerHTML = EMOJIS.map(e =>
      `<button class="emoji-btn${e === pickedEmoji ? ' on' : ''}" data-emoji="${e}" aria-label="${e}" aria-pressed="${e === pickedEmoji}">${e}</button>`
    ).join('');
  }

  document.getElementById('jEmojis').addEventListener('click', e => {
    const btn = e.target.closest('.emoji-btn');
    if (!btn) return;
    pickedEmoji = btn.dataset.emoji;
    renderEmojis();
  });

  /* ── Header date ────────────────────────── */

  function renderDate() {
    const d = new Date();
    document.getElementById('jDay').textContent  = DAYS_FULL[d.getDay()];
    document.getElementById('jDate').textContent = `${MONTHS[d.getMonth()]} ${d.getDate()}`;
  }

  /* ── Init ───────────────────────────────── */
  load();
  renderDate();
  renderEmojis();
  render();
</script>
</body>
</html>
